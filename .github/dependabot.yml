version: 2
updates:

  # Github Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps-github-actions)"
    groups:
      actions:
        patterns:
          - "*" # Groups all action updates into one PR to reduce noise

  # Python and Dev Dependencies
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps-python)"
    versioning-strategy: increase
    groups:
      dependencies:
        patterns:
          - "*"

  # Pre-commit
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps-precommit)"
    groups:
      hooks:
        patterns: ["*"]
