name: Publish to PyPI

on:
  release:
    types: [published]


jobs:
    publish:
        name: build
        runs-on: ubuntu-latest
        environment:
          name: pypi
          url: https://pypi.org/project/pytest-issues/
        permissions:
          id-token: write
          contents: read
        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v8.1.0
              with:
                enable-cache: true

            - name: Build package
              run: uv build

            - name: Publish to PyPI
              run: uv publish
